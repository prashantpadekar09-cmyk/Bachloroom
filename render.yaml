services:
  - type: web
    name: bacloroom
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    disk:
      name: bachloroom-local-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: DB_PATH
        value: /var/data/database.sqlite
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 193601576014-67vs333g79ttdm2b2dg3sbrhvpc8g8b8.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 193601576014-67vs333g79ttdm2b2dg3sbrhvpc8g8b8.apps.googleusercontent.com
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_SSL
        value: "true"
